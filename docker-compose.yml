version: '3.8'

services:
  level-generator-api:
    build: .
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:5001
    volumes:
      - ./levels:/app/levels
    container_name: level-generator
    restart: unless-stopped
    networks:
      - level-gen-network

volumes:
  levels:
    driver: local

networks:
  level-gen-network:
    driver: bridge
